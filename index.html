<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Chuk an Chukk</title>

<link rel="stylesheet" href="style.css">

<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script>
Pi.init({
    version:"2.0",
    sandbox:true
});
</script>

</head>

<body>

<div class="phone">

    <div class="header">

        <img src="assets/logo.png" class="logo" alt="Chuk an Chukk">

        <h1>CHUK AN CHUKK</h1>

        <h2>LIVE SOCIAL APP</h2>

        <p>FOR PI COMMUNITY</p>

    </div>

    <div class="status-card">

        <div>🛡️ Terhubung ke Pi Network</div>

        <div class="online">🟢 Sandbox Mode Aktif</div>

    </div>

    <button class="login-btn" onclick="login()">

        Ⓟ LOGIN DENGAN PI NETWORK

    </button>

    <div class="about">

        <h3>Tentang Chuk an Chukk</h3>

        <p>
        Platform sosial untuk komunitas Pi berbagi,
        berinteraksi, membuat konten,
        chat realtime,
        dan bertumbuh bersama.
        </p>

    </div>

</div>

<script>

function login(){

Pi.authenticate(
["username"],

function(auth){

alert("Selamat datang "+auth.user.username);

},

function(error){

alert("Login gagal");

}

);

}

</script>

</body>
</html>
