<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CHUK AN CHUKK</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<!-- HEADER -->

<header class="header">

<div class="logo-title">

<img src="logo.png" class="logo" alt="Logo">

<span>CHUK AN CHUKK</span>

</div>

<div class="header-icons">

<button onclick="searchPost()">🔍</button>

<button onclick="showNotifications()">🔔</button>

</div>

</header>

<!-- FEED -->

<main class="feed" id="feed">

<!-- POST PERTAMA -->

<div class="post">

<img src="post.jpg"
class="post-image"
alt="Postingan Pertama">

<div class="gradient"></div>

<div class="post-overlay">

<div class="post-info">

<h3>@ChukOfficial</h3>

<p>
🚀 Selamat datang di CHUK AN CHUKK.
Live Social App for Pi Community.
Mari berbagi foto, video dan membangun komunitas Pi bersama.
</p>

</div>

<div class="post-actions">

<button onclick="likePost()">❤️</button>

<button onclick="commentPost()">💬</button>

<button onclick="sharePost()">↗️</button>

<button onclick="savePost()">🔖</button>

</div>

</div>

</div>

</main>

<!-- MENU -->

<nav class="bottom-nav">

<button onclick="goHome()">
🏠
<span>Home</span>
</button>

<button onclick="window.location.href='post.html'">
➕
<span>Post</span>
</button>

<button onclick="goChat()">
💬
<span>Chat</span>
</button>

<button onclick="goProfile()">
👤
<span>Profile</span>
</button>

</nav>

</div>

<script src="script.js"></script>

</body>
</html>
