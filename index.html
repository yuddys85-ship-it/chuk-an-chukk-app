<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Buat Postingan - Chuk an Chukk</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="upload-page">

    <header class="upload-header">

        <button class="back-btn"
                onclick="history.back()">

            ←

        </button>

        <h2>Buat Postingan</h2>

        <button class="publish-btn"
                onclick="uploadPost()">

            Posting

        </button>

    </header>

    <div class="upload-content">

        <div class="preview-box">

            <img id="preview"
                 src="logo.png"
                 alt="Preview">

        </div>

        <input
            type="file"
            id="mediaFile"
            accept="image/*,video/*"
            onchange="previewMedia(event)">

        <textarea
            id="caption"
            placeholder="Apa yang sedang kamu pikirkan?"></textarea>

        <button class="choose-btn"
                onclick="document.getElementById('mediaFile').click()">

            📷 Pilih Foto / Video

        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
