<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chuk an Chukk</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

    <!-- HEADER -->
    <header class="header">

        <div class="logo-title">

            <img src="logo.png" alt="Chuk an Chukk" class="logo">

            <span>CHUK AN CHUKK</span>

        </div>

        <div class="header-icons">

            <button class="icon-btn" onclick="searchPost()">🔍</button>

            <button class="icon-btn" onclick="showNotifications()">🔔</button>

        </div>

    </header>

    <!-- FEED -->
    <main class="feed">

        <div class="post">

            <img src="post.jpg"
                 class="post-image"
                 alt="Postingan">

            <div class="gradient"></div>

            <div class="post-overlay">

                <div class="post-info">

                    <h3>@username</h3>

                    <p>
                        Selamat datang di Chuk an Chukk 🚀
                    </p>

                </div>

                <div class="post-actions">

                    <button onclick="likePost()">❤️</button>

                    <button onclick="commentPost()">💬</button>

                    <button onclick="sharePost()">↗️</button>

                    <button onclick="savePost()">🔖</button>

                </div>

            </div>

        </div>

    </main>

    <!-- BOTTOM MENU -->
    <nav class="bottom-nav">

        <button onclick="goHome()">
            🏠
            <span>Home</span>
        </button>

        <button onclick="goPost()">
            ➕
            <span>Post</span>
        </button>

        <button onclick="goChat()">
            💬
            <span>Chat</span>
        </button>

        <button onclick="goProfile()">
            👤
            <span>Profile</span>
        </button>

    </nav>

</div>

<script src="script.js"></script>

</body>
</html>
