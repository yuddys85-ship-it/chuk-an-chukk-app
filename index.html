<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CHUK AN CHUKK</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

<!-- HEADER -->

<header class="header">

<div class="logo-title">

<img src="assets/logo.png"
class="logo"
alt="Logo">

<span>CHUK AN CHUKK</span>

</div>

<div class="header-icons">

<button onclick="searchPost()">🔍</button>

<button onclick="showNotifications()">🔔</button>

</div>

</header>

<!-- FEED -->

<main class="feed" id="feed">

<!-- Feed otomatis dari Supabase -->

</main>

<!-- MENU -->

<nav class="bottom-nav">

<button onclick="goHome()">
🏠
<span>Home</span>
</button>

<button onclick="window.location.href='post.html'">
➕
<span>Post</span>
</button>

<button onclick="goChat()">
💬
<span>Chat</span>
</button>

<button onclick="goProfile()">
👤
<span>Profile</span>
</button>

</nav>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="supabase.js"></script>

<script src="script.js"></script>

<script>

async function loadPosts(){

    const { data, error } =
    await supabase
    .from("posts")
    .select("*")
    .order("created_at",{ascending:false});

    if(error){

        console.log(error);

        return;

    }

    const feed =
    document.getElementById("feed");

    feed.innerHTML = "";

    data.forEach(post=>{

        let media = "";

        if(post.media.match(/\.(mp4|webm|mov)$/i)){

            media = `
            <video
            class="post-image"
            controls>

            <source src="${post.media}">

            </video>`;

        }else{

            media = `
            <img
            src="${post.media}"
            class="post-image"
            alt="Post">`;

        }

        feed.innerHTML += `

        <div class="post">

            ${media}

            <div class="gradient"></div>

            <div class="post-overlay">

                <div class="post-info">

                    <h3>@ChukOfficial</h3>

                    <p>${post.caption || ""}</p>

                </div>

                <div class="post-actions">

                    <button onclick="likePost()">❤️</button>

                    <button onclick="commentPost()">💬</button>

                    <button onclick="sharePost()">↗️</button>

                    <button onclick="savePost()">🔖</button>

                </div>

            </div>

        </div>

        `;

    });

}

loadPosts();

</script>

</body>

</html>
