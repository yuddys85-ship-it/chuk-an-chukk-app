<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Chuk an Chukk</title>

    <link rel="stylesheet" href="style.css">

    <!-- Pi SDK -->
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>

    <script>
        Pi.init({
            version: "2.0",
            sandbox: true
        });
    </script>
</head>

<body>

<div class="app">

    <!-- Logo -->
    <img src="assets/logo.png" class="logo" alt="Chuk an Chukk">

    <!-- Judul -->
    <h1>CHUK AN CHUKK</h1>

    <h2>LIVE SOCIAL APP</h2>

    <p class="subtitle">
        FOR PI COMMUNITY
    </p>

    <!-- Status -->
    <div class="status-card">

        <p>🛡️ Terhubung ke Pi Network</p>

        <p class="online">
            🟢 Sandbox Mode Aktif
        </p>

    </div>

    <!-- Login -->
    <button class="login-btn" onclick="login()">

        Ⓟ LOGIN DENGAN PI NETWORK

    </button>

    <!-- Tentang -->
    <div class="about-card">

        <h3>Tentang Chuk an Chukk</h3>

        <p>

Platform sosial untuk komunitas Pi berbagi,
berinteraksi,
membuat konten,
chat realtime,
dan bertumbuh bersama.

        </p>

    </div>

</div>

<script>

function login(){

Pi.authenticate(
["username"],

function(auth){

alert("Selamat datang " + auth.user.username);

},

function(error){

alert("Login gagal");

console.log(error);

});

}

</script>

</body>

</html>
