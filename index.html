<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chuk an Chukk</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

    <!-- HEADER -->

    <header class="header">

        <div class="logo-title">

            <img src="logo.png" class="logo" alt="Logo">

            <span>CHUK AN CHUKK</span>

        </div>

        <div class="header-icons">

            <button class="icon-btn">🔍</button>

            <button class="icon-btn">🔔</button>

        </div>

    </header>

    <!-- FEED -->

    <main class="feed">

        <div class="post">

            <img src="post.jpg" class="post-image" alt="Postingan">

            <div class="post-overlay">

                <div class="post-info">

                    <h3>@username</h3>

                    <p>Selamat datang di Chuk an Chukk 🚀</p>

                </div>

                <div class="post-actions">

                    <button>❤️</button>

                    <button>💬</button>

                    <button>↗️</button>

                    <button>🔖</button>

                </div>

            </div>

        </div>

    </main>

    <!-- BOTTOM NAVIGATION -->

    <nav class="bottom-nav">

        <button>🏠<br>Home</button>

        <button>➕<br>Post</button>

        <button>💬<br>Chat</button>

        <button>👤<br>Profile</button>

    </nav>

</div>

<script src="script.js"></script>

</body>

</html>
