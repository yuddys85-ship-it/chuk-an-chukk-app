<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Chuk an Chukk</title>

  <link rel="stylesheet" href="style.css">

  <!-- Pi SDK -->
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <script>
    Pi.init({
      version: "2.0",
      sandbox: true
    });
  </script>
</head>

<body>

<div class="container">

    <!-- LOGO -->
    <img src="logo.png" class="logo" alt="Chuk an Chukk Logo">

    <h1>CHUK AN CHUKK</h1>

    <h2>LIVE SOCIAL APP</h2>

    <p class="subtitle">
        FOR PI COMMUNITY
    </p>

    <!-- STATUS -->
    <div class="status-card">

        <div class="status-item">
            🛡️ Terhubung ke Pi Network
        </div>

        <div class="status-item">
            🟢 Sandbox Mode Aktif
        </div>

    </div>

    <!-- LOGIN -->
    <button class="login-btn" onclick="loginPi()">
        Ⓟ LOGIN DENGAN PI NETWORK
    </button>

    <!-- ABOUT -->
    <div class="about-card">

        <h3>Tentang Chuk an Chukk</h3>

        <p>
            Platform sosial untuk komunitas Pi berbagi,
            berinteraksi, membuat konten,
            chat realtime, dan bertumbuh bersama.
        </p>

    </div>

</div>

<script>

function loginPi(){

    Pi.authenticate(
        ["username"],

        function(auth){

            alert("Selamat datang " + auth.user.username);

        },

        function(error){

            alert("Login gagal");

            console.log(error);

        }

    );

}

</script>

</body>
</html>
