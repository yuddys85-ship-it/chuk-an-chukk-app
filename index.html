<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chuk an Chukk</title>

<link rel="stylesheet" href="style.css">

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<script>
Pi.init({
  version: "2.0",
  sandbox: true
});
</script>

</head>

<body>

<div class="container">

    <div class="logo">
        <img src="assets/logo.png" alt="Chuk an Chukk">
    </div>

    <h1>CHUK AN CHUKK</h1>

    <h3>LIVE SOCIAL APP</h3>

    <p class="subtitle">FOR PI COMMUNITY</p>

    <div class="status-card">

        <div class="status-title">
            🛡 Terhubung ke Pi Network
        </div>

        <div class="status-online">
            🟢 Sandbox Mode Aktif
        </div>

    </div>

    <button class="login-btn" onclick="loginPi()">
        Ⓟ LOGIN DENGAN PI NETWORK
    </button>

    <div class="about-card">

        <h2>Tentang Chuk an Chukk</h2>

        <p>
        Platform sosial untuk komunitas Pi berbagi,
        berinteraksi, membuat konten,
        chat realtime, dan bertumbuh bersama.
        </p>

    </div>

    <div class="dots">

        <span class="active"></span>
        <span></span>
        <span></span>
        <span></span>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
